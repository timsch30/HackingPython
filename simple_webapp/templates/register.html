{% extends "base.html" %}
{% block content %}
<h1>Registrierung</h1>
{% if error %}<p class="error">{{ error }}</p>{% endif %}
<form method="post">
  <label>Username: <input name="username" required></label><br><br>
  <label>Passwort: <input type="password" name="password" required></label><br><br>
  <button type="submit">Registrieren</button>
</form>
{% endblock %}
