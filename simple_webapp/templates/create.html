{% extends "base.html" %}
{% block content %}
<h1>Neuen Inhalt erstellen</h1>
<p>Der Text muss mindestens 1024 Zeichen enthalten.</p>
{% if error %}<p class="error">{{ error }}</p>{% endif %}
<form method="post">
  <textarea name="text" rows="16" required></textarea><br><br>
  <button type="submit">Speichern</button>
</form>
{% endblock %}
