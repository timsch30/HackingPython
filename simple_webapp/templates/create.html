{% extends "base.html" %}
{% block title %}New Item{% endblock %}
{% block content %}
<h1 class="h3">New Item Page</h1>
<p>Text mit mindestens 1024 Zeichen eingeben.</p>
{% if error %}<div class="alert alert-danger">{{ error }}</div>{% endif %}
<form method="post">
  <div class="mb-3">
    <textarea name="text" rows="12" class="form-control" required></textarea>
  </div>
  <button type="submit" class="btn btn-dark">Speichern</button>
</form>
{% endblock %}
